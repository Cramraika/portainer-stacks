# uptime-kuma — fleet uptime monitor (Git-backed Portainer stack pattern; OW-225 closure)
# Origin: live-captured 2026-05-30 from running `docker run` config on vagary-core-1.
# Network attachments codified: bridge + monitoring + portainer-net (host_page needs portainer-net to reach kuma).
# Prevents R-NETATTACH-DRIFT-AFTER-RECREATE recurrence pattern (was: live-attached on recreate; lost on next recreate).
#
# Migration: in Portainer UI → Stacks → Add stack → Git repository → repo: this repo
# → compose path: stacks/uptime-kuma/docker-compose.yml → Deploy. After first deploy,
# verify all 3 networks attached + host_page /api/status returns 200.
name: uptime-kuma
services:
  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2.2.1-rootless
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - /opt/uptime-kuma:/app/data
    networks:
      - bridge
      - monitoring
      - portainer-net
networks:
  bridge:
    external: true
  monitoring:
    external: true
  portainer-net:
    external: true
