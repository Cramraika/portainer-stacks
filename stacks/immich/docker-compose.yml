#
# Immich Stack for Portainer  (Git-backed stack — this repo IS the live source)
# Secrets: env_file points at the absolute Infisical-rendered path
#   /root/.infisical-rendered/immich.env (Mechanism A, ADR-012). The absolute
#   path survives Portainer git-redeploy (no stack.env symlink to clobber).
# Non-secret path vars (UPLOAD_LOCATION / LOCAL_STORAGE / DB_DATA_LOCATION /
#   DB_USERNAME / DB_DATABASE_NAME / IMMICH_VERSION) are supplied via Portainer's
#   stack Env array for compose ${...} interpolation — they are NOT secret.
# NOTE: postgres POSTGRES_PASSWORD is set from ${DB_PASSWORD}; the immich.env
#   render template emits POSTGRES_PASSWORD too (vps-ansible) so a from-scratch
#   DB init is correct. On the existing data dir POSTGRES_PASSWORD is inert.
# immich-server joins the shared `monitoring` network so Prometheus scrapes :8081/:8082.
#
name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v2.7.5
    volumes:
      - ${UPLOAD_LOCATION}/library:/usr/src/app/upload/library
      - ${LOCAL_STORAGE}/upload:/usr/src/app/upload/upload
      - ${LOCAL_STORAGE}/thumbs:/usr/src/app/upload/thumbs
      - ${LOCAL_STORAGE}/encoded-video:/usr/src/app/upload/encoded-video
      - ${LOCAL_STORAGE}/profile:/usr/src/app/upload/profile
      - ${LOCAL_STORAGE}/backups:/usr/src/app/upload/backups
      - /etc/localtime:/etc/localtime:ro
      # OW-202 2026-05-30: bind-mount the Infisical-rendered Immich config-file (RO)
      # so notifications.smtp.transport.password lives in env-source, NOT in the
      # system_metadata DB row. The host file is rendered by infisical-agent from
      # `vps-ansible roles/substrate/files/infisical-tpl/main_host/immich-config.tpl`;
      # the agent re-renders + `docker restart immich_server` on rotation (polling
      # 300s). Vendor pattern per https://docs.immich.app/install/config-file/ —
      # fields in the config-file appear as read-only in Admin → Settings UI.
      # Migration design: platform-docs/docs/audits/immich-smtp-env-source-migration-2026-05-30.md
      - /etc/immich/config.json:/etc/immich/config.json:ro
    env_file:
      - /root/.infisical-rendered/immich.env
    environment:
      - TZ=Asia/Kolkata
      - IMMICH_LOG_FORMAT=json
      - IMMICH_TELEMETRY_INCLUDE=all
      # OW-202: tell Immich to load the config-file from the bind-mounted path.
      # Per Immich docs, this env names the path INSIDE the container.
      - IMMICH_CONFIG_FILE=/etc/immich/config.json
    ports:
      # Bound to loopback — Immich is reached only via the Caddy `gallery` vhost
      # on core-1. A 0.0.0.0 publish exposed Immich directly, bypassing Caddy +
      # Cloudflare Access (Caddy campaign 2026-05-17, W5).
      - '127.0.0.1:2283:2283'
    networks:
      - default
      - monitoring
    depends_on:
      - redis
      - database
    restart: always
    mem_limit: 2g
    # CPU monopoly-bound (OW-302; firewall-stack §W8 2026-06-06). core-1 is a 2-vCPU host;
    # the 2026-06-06 disk-full→throttle incident + the cold-reboot herd showed uncapped
    # containers can pin the box. cpus is a MAX (CFS still shares the 2 cores) — these bounds
    # let immich burst normally (24h-peak <0.02 core) but never take both cores from the fleet.
    cpus: 1.0
    healthcheck:
      disable: false

  # immich-machine-learning: RELOCATED to compute-1 (operator override 2026-06-08;
  # ADR-096 Amendment A1). The ML container no longer runs on core-1 — its compose is
  # now ../immich-ml/docker-compose.yml, live on compute-1 at /opt/immich-ml/docker-compose.yml,
  # bound to the tailnet at 100.64.0.2:3003. immich_server reaches it via
  # machineLearning.urls in /etc/immich/config.json (rendered from
  # vps-ansible …/main_host/immich-config.tpl) — no compose link from this stack is needed
  # (the server calls ML over the tailnet). VERSION-PIN: the immich-ml image tag MUST
  # equal immich-server's tag on every upgrade. (Removed with it: the `model-cache` volume,
  # which now lives in the immich-ml stack.)

  redis:
    container_name: immich_redis
    # redis-valkey-campaign 2026-05-29: requirepass (REDIS_PASSWORD from Infisical immich proj → immich.env render) + queue tuning (noeviction, job-queue) + Valkey-8 io-threads.
    # OW-234 2026-05-31: previous form used compose-interpolation `${REDIS_PASSWORD}` in
    # `command:`, but the redis service had no `env_file:` directive — docker-compose
    # interpolates from stack.env (Portainer working_dir), which never carried
    # REDIS_PASSWORD. Result: `--requirepass` got no value, valkey treated `--maxmemory`
    # as the password and `192mb` as the next arg, producing the malformed config
    #   requirepass "--maxmemory" "192mb"
    # → 646 restarts in <11h. Fix: (1) add env_file pointing at the Infisical render so
    # REDIS_PASSWORD is available IN the container, and (2) switch the `command:` to
    # shell-form via `sh -c` so `$$REDIS_PASSWORD` (compose-escaped) is resolved by the
    # shell at runtime against env_file vars (compose-interpolation no longer involved).
    # Healthcheck already correctly uses `$${REDIS_PASSWORD}` (runtime-resolved).
    env_file:
      - /root/.infisical-rendered/immich.env
    command: ["sh", "-c", "exec valkey-server --requirepass \"$$REDIS_PASSWORD\" --maxmemory 192mb --maxmemory-policy noeviction --maxmemory-samples 10 --tcp-keepalive 60 --io-threads 2 --save \"900 1 300 10\""]
    image: docker.io/valkey/valkey:8-bookworm@sha256:fec42f399876eb6faf9e008570597741c87ff7662a54185593e74b09ce83d177
    environment:
      - TZ=Asia/Kolkata
    healthcheck:
      test: valkey-cli -a "$${REDIS_PASSWORD}" --no-auth-warning ping || exit 1
    restart: always
    mem_limit: 256m
    cpus: 0.5  # CPU monopoly-bound (OW-302) — valkey is light; 0.5 is ample

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3-pgvector0.8.1
    env_file:
      - /root/.infisical-rendered/immich.env
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS='--data-checksums'
      - TZ=Asia/Kolkata
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql
    restart: always
    mem_limit: 1g
    cpus: 1.0  # CPU monopoly-bound (OW-302) — postgres+pgvector; 1.0 ample, bounds vector-index bursts

networks:
  default:
  monitoring:
    external: true
