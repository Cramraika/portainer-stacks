#
# Immich Stack for Portainer
# Make sure to configure environment variables in Portainer's stack environment section
#
# Captured from live Portainer stack ID=8 on vagary-core-1, 2026-05-16 (OW-17).
# Non-secret ${VAR} placeholders only; secrets render via Infisical (immich.env)
# at deploy time. See .env.example for the variable list.
#
version: '3.8'

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v2.7.4
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Original photos/videos on rclone union mount (external storage)
      - ${UPLOAD_LOCATION}/library:/usr/src/app/upload/library
      # Everything else on local fast storage to avoid rclone overhead
      - ${LOCAL_STORAGE}/upload:/usr/src/app/upload/upload
      - ${LOCAL_STORAGE}/thumbs:/usr/src/app/upload/thumbs
      - ${LOCAL_STORAGE}/encoded-video:/usr/src/app/upload/encoded-video
      - ${LOCAL_STORAGE}/profile:/usr/src/app/upload/profile
      - ${LOCAL_STORAGE}/backups:/usr/src/app/upload/backups
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - stack.env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.4
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - stack.env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:fec42f399876eb6faf9e008570597741c87ff7662a54185593e74b09ce83d177
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3-pgvector0.8.1
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS='--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql
    restart: always

volumes:
  model-cache:
