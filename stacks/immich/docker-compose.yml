#
# Immich Stack for Portainer  (Git-backed stack — this repo IS the live source)
# Secrets: env_file points at the absolute Infisical-rendered path
#   /root/.infisical-rendered/immich.env (Mechanism A, ADR-012). The absolute
#   path survives Portainer git-redeploy (no stack.env symlink to clobber).
# Non-secret path vars (UPLOAD_LOCATION / LOCAL_STORAGE / DB_DATA_LOCATION /
#   DB_USERNAME / DB_DATABASE_NAME / IMMICH_VERSION) are supplied via Portainer's
#   stack Env array for compose ${...} interpolation — they are NOT secret.
# NOTE: postgres POSTGRES_PASSWORD is set from ${DB_PASSWORD}; the immich.env
#   render template emits POSTGRES_PASSWORD too (vps-ansible) so a from-scratch
#   DB init is correct. On the existing data dir POSTGRES_PASSWORD is inert.
# immich-server joins the shared `monitoring` network so Prometheus scrapes :8081/:8082.
#
name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v2.7.5
    volumes:
      - ${UPLOAD_LOCATION}/library:/usr/src/app/upload/library
      - ${LOCAL_STORAGE}/upload:/usr/src/app/upload/upload
      - ${LOCAL_STORAGE}/thumbs:/usr/src/app/upload/thumbs
      - ${LOCAL_STORAGE}/encoded-video:/usr/src/app/upload/encoded-video
      - ${LOCAL_STORAGE}/profile:/usr/src/app/upload/profile
      - ${LOCAL_STORAGE}/backups:/usr/src/app/upload/backups
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - /root/.infisical-rendered/immich.env
    environment:
      - TZ=Asia/Kolkata
      - IMMICH_LOG_FORMAT=json
      - IMMICH_TELEMETRY_INCLUDE=all
    ports:
      # Bound to loopback — Immich is reached only via the Caddy `gallery` vhost
      # on core-1. A 0.0.0.0 publish exposed Immich directly, bypassing Caddy +
      # Cloudflare Access (Caddy campaign 2026-05-17, W5).
      - '127.0.0.1:2283:2283'
    networks:
      - default
      - monitoring
    depends_on:
      - redis
      - database
    restart: always
    mem_limit: 2g
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
    volumes:
      - model-cache:/cache
    env_file:
      - /root/.infisical-rendered/immich.env
    environment:
      - TZ=Asia/Kolkata
      - IMMICH_LOG_FORMAT=json
    restart: always
    mem_limit: 2560m
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:fec42f399876eb6faf9e008570597741c87ff7662a54185593e74b09ce83d177
    environment:
      - TZ=Asia/Kolkata
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    mem_limit: 256m

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3-pgvector0.8.1
    env_file:
      - /root/.infisical-rendered/immich.env
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS='--data-checksums'
      - TZ=Asia/Kolkata
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql
    restart: always
    mem_limit: 1g

volumes:
  model-cache:

networks:
  default:
  monitoring:
    external: true
